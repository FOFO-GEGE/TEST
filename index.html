<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test scan code-barres</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
  #status { padding: 10px 16px; font-size: 13px; background: #222; color: #aaa; }
  #status b { color: #4ade80; }
  #videoWrap { position: relative; flex: 1; min-height: 55vh; background: #000; }
  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #result { padding: 20px 16px; background: #1a1a1a; text-align: center; }
  #result .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; }
  #code { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; color: #4ade80; min-height: 38px; }
  #log { padding: 10px 16px; font-size: 11px; font-family: monospace; color: #777; white-space: pre-wrap; max-height: 130px; overflow-y: auto; }
</style>
</head>
<body>

<div id="status">démarrage…</div>
<div id="videoWrap"><video id="video" muted playsinline autoplay></video></div>
<div id="result">
  <div class="label">Dernier code lu</div>
  <div id="code">—</div>
</div>
<div id="log"></div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const log = msg => { $("log").textContent += msg + "\n"; $("log").scrollTop = 99999; };
const setStatus = html => $("status").innerHTML = html;

// ── Validation : clé de contrôle EAN-8 / EAN-13 / UPC-A ──
// Le dernier chiffre est calculé à partir des autres : un code mal lu échoue à ce test.
function validChecksum(code) {
  if (!/^\d{8}$|^\d{12,13}$/.test(code)) return false;
  const digits = code.split("").map(Number);
  const check = digits.pop();
  let sum = 0;
  // poids 3 sur les positions impaires depuis la droite
  digits.reverse().forEach((d, i) => { sum += d * (i % 2 === 0 ? 3 : 1); });
  return (10 - (sum % 10)) % 10 === check;
}

// ── Vote : on n'accepte un code qu'après N lectures identiques consécutives ──
const CONFIRM = 3;
let candidate = null, votes = 0, accepted = null;

function onRead(value) {
  const v = String(value).trim();
  if (v === accepted) return;                 // déjà validé
  if (!validChecksum(v)) { log("rejeté (checksum) : " + v); return; }
  if (v === candidate) { votes++; } else { candidate = v; votes = 1; }
  log("lecture " + votes + "/" + CONFIRM + " : " + v);
  if (votes >= CONFIRM) {
    accepted = v;
    $("code").textContent = v;
    log("✔ CODE CONFIRMÉ : " + v);
    if (navigator.vibrate) navigator.vibrate(80);
  }
}

(async () => {
  log("page chargée — " + navigator.userAgent.slice(0, 80));

  // 1. Moteur natif du navigateur : seulement s'il sait VRAIMENT lire des formats
  let detector = null;
  if ("BarcodeDetector" in window) {
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      log("BarcodeDetector présent — formats : [" + formats.join(", ") + "]");
      const wanted = ["ean_13", "ean_8", "upc_a", "upc_e"].filter(f => formats.includes(f));
      log("formats retenus (produits uniquement) : [" + wanted.join(", ") + "]");
      if (wanted.length > 0) {
        detector = new BarcodeDetector({ formats: wanted });
      } else {
        log("→ liste vide (cas Chrome PC) : moteur inutilisable, passage à ZXing");
      }
    } catch (e) { log("BarcodeDetector erreur : " + e.message); }
  } else {
    log("BarcodeDetector absent de ce navigateur");
  }

  // ── Chemin natif : on gère la caméra nous-mêmes
  if (detector) {
    setStatus("moteur : <b>natif</b> — cadrez un code-barres");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      $("video").srcObject = stream;
      await $("video").play();
      log("caméra démarrée (natif)");
    } catch (e) { setStatus("accès caméra refusé"); log("getUserMedia : " + e.message); return; }

    const tick = async () => {
      try {
        const codes = await detector.detect($("video"));
        if (codes.length) onRead(codes[0].rawValue);
      } catch (e) {}
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return;
  }

  // ── Chemin ZXing : on lui laisse TOUT gérer, caméra comprise
  if (window.ZXing && ZXing.BrowserMultiFormatReader) {
    setStatus("moteur : <b>zxing</b> — cadrez un code-barres");
    // Restreindre aux codes produits : moins de formats candidats = moins de fausses lectures
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    const reader = new ZXing.BrowserMultiFormatReader(hints);
    log("ZXing chargé (formats EAN/UPC + TRY_HARDER), démarrage…");
    try {
      await reader.decodeFromConstraints(
        { video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } } },
        $("video"),
        (result, err) => {
          if (result) onRead(result.getText());
          // err = NotFoundException à chaque image sans code : normal, on ignore
        }
      );
      log("boucle ZXing lancée — la lecture est active");
    } catch (e) { setStatus("accès caméra refusé ou lecture impossible"); log("ZXing : " + e.message); }
    return;
  }

  setStatus("aucun moteur disponible");
  log("ZXing non chargé (CDN inaccessible ?)");
})();
</script>
</body>
</html>
