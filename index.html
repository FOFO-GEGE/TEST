<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan code-barres par photo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #fff; min-height: 100vh; padding: 20px 16px; }
  h1 { font-size: 17px; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 18px; }
  #btnPhoto { display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; background: #16a34a; color: #fff; cursor: pointer; margin-bottom: 10px; }
  #btnFile { display: block; width: 100%; padding: 12px; font-size: 13px; border: 1px solid #333; border-radius: 12px; background: transparent; color: #aaa; cursor: pointer; margin-bottom: 18px; }
  #preview { width: 100%; max-height: 260px; object-fit: contain; border-radius: 12px; background: #000; display: none; margin-bottom: 14px; }
  #result { padding: 18px 14px; background: #1a1a1a; border-radius: 14px; text-align: center; margin-bottom: 14px; }
  #result .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; }
  #code { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: #4ade80; min-height: 34px; word-break: break-all; }
  #status { font-size: 13px; color: #f59e0b; text-align: center; min-height: 18px; margin-bottom: 12px; }
  #log { font-size: 11px; font-family: monospace; color: #666; white-space: pre-wrap; max-height: 160px; overflow-y: auto; background: #0a0a0a; border-radius: 10px; padding: 10px; }
  input[type=file] { display: none; }
</style>
</head>
<body>

<h1>Lecture de code-barres par photo</h1>
<div class="sub">Prenez le code en photo, net et de près — le décodage se fait sur l'image fixe.</div>

<button id="btnPhoto">📷 Prendre le code-barres en photo</button>
<button id="btnFile">…ou choisir une image existante</button>

<input type="file" id="inputPhoto" accept="image/*" capture="environment">
<input type="file" id="inputFile" accept="image/*">

<img id="preview" alt="">
<div id="status"></div>
<div id="result">
  <div class="label">Code lu</div>
  <div id="code">—</div>
</div>
<div id="log"></div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const log = m => { $("log").textContent += m + "\n"; $("log").scrollTop = 99999; };
const setStatus = m => $("status").textContent = m;

// ── Clé de contrôle EAN-8 / EAN-13 / UPC-A : élimine les lectures erronées ──
function validChecksum(code) {
  if (!/^\d{8}$|^\d{12,13}$/.test(code)) return false;
  const d = code.split("").map(Number);
  const check = d.pop();
  let sum = 0;
  d.reverse().forEach((n, i) => { sum += n * (i % 2 === 0 ? 3 : 1); });
  return (10 - (sum % 10)) % 10 === check;
}

$("btnPhoto").onclick = () => $("inputPhoto").click();
$("btnFile").onclick  = () => $("inputFile").click();
$("inputPhoto").onchange = e => handleFile(e.target.files[0]);
$("inputFile").onchange  = e => handleFile(e.target.files[0]);

async function handleFile(file) {
  if (!file) return;
  $("code").textContent = "—";
  setStatus("analyse en cours…");
  log("— image reçue : " + file.name + " (" + Math.round(file.size/1024) + " ko)");

  const url = URL.createObjectURL(file);
  const img = $("preview");
  img.style.display = "block";
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
  log("image chargée : " + img.naturalWidth + "×" + img.naturalHeight);

  // On tente plusieurs variantes : originale, agrandie, rotations.
  // Une photo n'est jamais parfaitement cadrée — c'est le rôle du décodage, pas de l'utilisateur.
  const found = await decodeWithVariants(img);

  URL.revokeObjectURL(url);
  $("inputPhoto").value = ""; $("inputFile").value = "";

  if (found) {
    $("code").textContent = found;
    setStatus("");
    log("✔ CODE VALIDE : " + found);
    if (navigator.vibrate) navigator.vibrate(80);
  } else {
    setStatus("Aucun code lisible — reprenez la photo de plus près, bien à plat, sans reflet.");
    log("✘ échec sur toutes les variantes");
  }
}

// Dessine l'image sur un canvas avec échelle et rotation données
function toCanvas(img, scale, angle) {
  const w = Math.round(img.naturalWidth * scale);
  const h = Math.round(img.naturalHeight * scale);
  const c = document.createElement("canvas");
  if (angle % 180 === 0) { c.width = w; c.height = h; }
  else { c.width = h; c.height = w; }
  const ctx = c.getContext("2d");
  ctx.translate(c.width / 2, c.height / 2);
  ctx.rotate(angle * Math.PI / 180);
  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  return c;
}

async function decodeWithVariants(img) {
  // Moteur natif seulement s'il sait vraiment lire (liste de formats non vide)
  let detector = null;
  if ("BarcodeDetector" in window) {
    try {
      const fs = await BarcodeDetector.getSupportedFormats();
      const wanted = ["ean_13", "ean_8", "upc_a", "upc_e"].filter(f => fs.includes(f));
      if (wanted.length) { detector = new BarcodeDetector({ formats: wanted }); log("moteur natif dispo (" + wanted.join(",") + ")"); }
      else log("moteur natif présent mais vide → ZXing");
    } catch {}
  }

  // Moteur ZXing restreint aux codes produits + mode renforcé
  let reader = null;
  if (window.ZXing) {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.BrowserMultiFormatReader(hints);
  }

  // Variantes : taille max 1600px pour la vitesse, puis pleine taille ; 4 rotations
  const baseScale = Math.min(1, 1600 / Math.max(img.naturalWidth, img.naturalHeight));
  const variants = [];
  for (const scale of [baseScale, 1]) {
    for (const angle of [0, 90, 180, 270]) variants.push({ scale, angle });
    if (baseScale === 1) break; // pas de doublon si l'image est déjà petite
  }

  for (const v of variants) {
    const canvas = toCanvas(img, v.scale, v.angle);
    const tag = "échelle " + v.scale.toFixed(2) + " / rot " + v.angle + "°";

    // 1. natif
    if (detector) {
      try {
        const codes = await detector.detect(canvas);
        for (const c of codes) {
          const val = String(c.rawValue).trim();
          if (validChecksum(val)) { log("natif OK (" + tag + ")"); return val; }
          log("natif rejeté checksum (" + tag + ") : " + val);
        }
      } catch {}
    }
    // 2. zxing
    // 2. zxing — via decodeFromImageUrl : sa gestion interne ne sait pas
    // mesurer un canvas passé directement, il faut lui donner une image.
    if (reader) {
      try {
        const result = await reader.decodeFromImageUrl(canvas.toDataURL("image/jpeg", 0.92));
        if (result) {
          const val = String(result.getText()).trim();
          if (validChecksum(val)) { log("zxing OK (" + tag + ")"); return val; }
          log("zxing rejeté checksum (" + tag + ") : " + val);
        }
      } catch (e) { /* NotFound : normal, on tente la variante suivante */ }
    }
    log("rien (" + tag + ")");
  }
  return null;
}
</script>
</body>
</html>
